name: Build & Push Multi-Service Images

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - closed
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'     
        required: true
        default: 'warning'

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        service:
          - name: circlewash
            context: ./circlewash
            environment:
              MONGO_URI: ${{ vars.MONGO_URI }}
              PORT: ${{ vars.CIRCLEWASH_LEGACY_PUBLIC_FACING_PORT }}
            dockerfile: ./circlewash/dockerfile

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository.toLowerCase() }}-${{ matrix.service.name.toLowerCase() }}:latest