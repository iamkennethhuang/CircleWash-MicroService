name: Deploy App to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu:24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Install dependencies circlewash
      #   working-directory: ./circlewash
      #   run: npm install

      # - name: Install dependencies circlewashstaff
      #   working-directory: ./circlewashstaff
      #   run: npm install
      
      # - name: Install dependencies new-circlewash-frontend
      #   working-directory: ./new-circlewash-frontend
      #   run: npm install

      # Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      # Add droplet to known hosts
      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts

      # Deploy via SSH
      - name: Deploy to Droplet
        run: |
          ssh ${{ secrets.DO_USERNAME }}@${{ secrets.DO_HOST }} << 'EOF'

            echo "📁 Creating app directory if not exists"
            mkdir -p ${{ secrets.DO_APP_DIR }}
            cd ${{ secrets.DO_APP_DIR }}

            echo "📦 Pull latest code"
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }} .
            fi

            echo "🐳 Stopping old containers"
            docker-compose down

            echo "🚀 Rebuilding containers"
            docker-compose up -d --build

            echo "🧹 Cleaning unused images"
            docker system prune -f

          EOF