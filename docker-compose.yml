version: "0.1"

services:
  machine:
    build: ./backend/machine
    ports:
      - "3000:3000"
    volumes:
      - ./backend/machine:/app
      - /app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/mydb
      - PORT=3000
      - APP_SECRET=''
      - ATLAS_URI=''
      - FASCARD_USERNAME=''
      - FASCARD_PASSWORD=''
      - MESSAGE_BROKER_URL=amqp://guest:guest@rabbitmq:5672
      - EXCHANGE_NAME=CUSTOMER_SUPPORT
      - QUEUE_NAME=MACHINE_QUEUE
      - SUPPORT_CASE_BINDING_KEY=SUPPORT_CASE_SERVICE
      - MACHINE_BINDING_KEY=MACHINE_SERVICE
    depends_on:
      - mongo
      - rabbitmq

  mongo:
    image: mongo
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    hostname: "rabbitmq"
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    configs:
      - source: rabbitmq-plugins
        target: /etc/rabbitmq/enabled_plugins
    volumes:
      - rabbitmq-lib:/var/lib/rabbitmq/
      - rabbitmq-log:/var/log/rabbitmq

configs:
  rabbitmq-plugins:
    content: "[rabbitmq_management]."  

volumes:
  rabbitmq-lib:
    driver: local
  rabbitmq-log:
    driver: local

  